seed: 42
device: cuda
amp: true
data:
  train_video_dir: data/train
  val_npy_dir: data/val_labels
  val_image_root: data/val_images
  categories: [regular, low-texture, low-light, small-foreground, large-foreground]
  crop_h: 315
  crop_w: 560
  temporal_gap_min: 1
  temporal_gap_max: 5
  pairs_per_epoch: 12000
  batch_size: 4
  num_workers: 4
model:
  max_corner_offset: 128.0
  feature_channels: 1
loss:
  lambda_triplet: 2.0
  mu_inverse: 0.01
train:
  total_iters: 120000
  stage1_iters: 60000
  lr: 0.0001
  beta1: 0.9
  beta2: 0.999
  eps: 0.00000001
  lr_decay_every: 12000
  lr_decay_gamma: 0.8
  log_every: 50
  val_every: 2000
  ckpt_every: 5000
  out_dir: runs/content_aware_homography
